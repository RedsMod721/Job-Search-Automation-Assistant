app:
  name: "Job Search Automation Assistant"
  interface_language: "English"
  local_only: true
  default_page: "Dashboard"

llm:
  provider: "ollama"
  model: "qwen3:4b"
  fallback_models:
    - "llama3.2:latest"
    - "qwen2.5:7b"
  timeout_seconds: 120
  temperature: 0.2
  require_review_before_save: true
  extraction_prompt_version: "stage6-v2"

extraction_evaluation:
  dataset_path: "samples/extraction_eval/v1/manifest.yaml"
  real_dataset_path: "samples/extraction_eval/real_2026_06_23/MANIFEST.json"
  output_dir: ".tmp/extraction_evaluations"
  default_runner: "fixture"
  min_field_accuracy: 0.8

database:
  type: "sqlite"
  path: "database/applications.db"

exports:
  excel_enabled: true
  export_folder: "exports/excel"
  timestamp_filenames: true

google_sheets:
  enabled: false
  spreadsheet_id: ""
  worksheet_name: "Applications"
  credentials_path: "config/google_service_account.json"
  sqlite_is_source_of_truth: true
  startup_sync_enabled: true
  timer_sync_enabled: true
  change_triggered_sync_enabled: true
  timer_interval_seconds: 60
  max_retry_attempts: 5
  retry_backoff_seconds: 60

network:
  verify_tls: true
  custom_ca_bundle: ""
  http_proxy: ""
  https_proxy: ""
  no_proxy: ""
  request_timeout_seconds: 30

automation:
  auto_submit_applications: false
  linkedin_scraping: false
  auto_send_messages: false
  captcha_bypass: false
  require_user_confirmation_for_generated_content: true

form_helper:
  supported_platforms:
    - "LinkedIn"
    - "Workday"
    - "Greenhouse"
    - "Lever"
    - "Welcome to the Jungle"
    - "Company Website"
    - "Other"
  default_platform: "LinkedIn"

search:
  enabled_in_v1: false
  allow_public_company_website_search: true
  allow_linkedin_mass_scraping: false
  save_source_provenance: true

logging:
  enabled: true
  log_file: "logs/app.log"
  level: "INFO"

name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Format check
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy app.py src tests

      - name: Tests
        run: uv run pytest

      - name: Security scan
        run: uv run bandit -c pyproject.toml -r app.py src

      - name: Dependency audit
        run: uv run pip-audit --cache-dir .tmp/pip-audit-cache

      - name: Diagnostics smoke test
        run: uv run python scripts/diagnostics.py --json
